
# C-t c  New Window
# C-t ,  naming
# "> exit" delete window
# C-t ;  toggle pane (before active)
# C-t o  next pane

# prefix C-b -> C-t
unbind C-b
# ESC が prefix のように振る舞う時間を 0 に
set -s escape-time 0
set -g prefix C-t
bind C-t send-prefix

# マウス操作
set -g mouse on

# 256色表示
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# 1-base-index
set -g base-index 1


## keybind {{{
###     # key list
###     tmux list-keys | grep
### `bind `   prefix ありの bind
### `bind -n` prefix なしの bind

# 設定ファイルをリロードするショートカット (Prefix + r)
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf ; display "Reloaded!"

bind -n M-n next-window
bind -n M-k previous-window

# copy-mode-vi
setw -g mode-keys vi
bind v copy-mode
# v, V, C-V で選び始め
## (WSL2 + Ubuntu + Tmux のコピーに関しては別記)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
# UTF-16 に変換し bomb <feff> を sed で消去 -> clip.exe
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
"iconv -f utf-8 -t utf-16le | sed '1s/^\xFF\xFE//' | clip.exe"

## my-vim mapping
bind-key -T copy-mode-vi n send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi C-n send-keys -X search-again
bind-key -T copy-mode-vi C-k send-keys -X search-reverse
bind-key -T copy-mode-vi L   send-keys -X end-of-line
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi u   send-keys -X previous-paragraph
bind-key -T copy-mode-vi e   send-keys -X next-paragraph

# choose-tree (prefix + w, prefix + s)
# bind-key -T root -T choose-session n send-keys Down
# bind-key -T root -T choose-session k send-keys Up

